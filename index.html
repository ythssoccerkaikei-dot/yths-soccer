<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>吉原工業サッカー部父母会 - 父母会費管理システム</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>
  
  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    // Lucide Iconsをグローバルに設定
    window.lucideReact = window.lucide;
  </script>
  
  <!-- Firebase App (最初に読み込み) -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, doc, getDoc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    
    // Firebase設定
    const firebaseConfig = {
      apiKey: "AIzaSyClIKuIG7rpDElq2nXTgpaYGNyYkuMXdjc",
      authDomain: "yths-soccer-accounting.firebaseapp.com",
      projectId: "yths-soccer-accounting",
      storageBucket: "yths-soccer-accounting.firebasestorage.app",
      messagingSenderId: "821933079252",
      appId: "1:821933079252:web:009323e51b6b25d5bd9941"
    };
    
    // Firebaseを初期化
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    // グローバルに公開
    window.firebaseApp = app;
    window.db = db;
    window.firebaseFirestore = { collection, doc, getDoc, setDoc, onSnapshot };
  </script>
  
  <!-- Appコンポーネント -->
  <script type="text/babel" src="./app-firebase-v2.jsx"></script>
  
  <script type="text/babel">
    const { createRoot } = ReactDOM;
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
